<!-- AI PRO CHAT BOX -->
<div class="box">
<h2>🤖 AI Мұғалім PRO</h2>

<input type="text" id="question" placeholder="Сұрақ жазыңыз...">

<button onclick="askAI()">Жіберу</button>

<div id="chatArea" style="margin-top:15px;"></div>
</div>

<style>
.chat-user{
background:#222;
padding:12px;
border-radius:14px;
margin-top:10px;
text-align:right;
}

.chat-ai{
background:gold;
color:#000;
padding:12px;
border-radius:14px;
margin-top:10px;
font-weight:bold;
}
</style>

<script>
function askAI(){

let q=document.getElementById("question").value;
let text=q.toLowerCase();

if(q.trim()=="") return;

let answer="🇰🇿 Жауап табылмады. 🇷🇺 Ответ не найден. 🇬🇧 Answer not found.";

if(text.includes("nacl"))
answer="🇰🇿 Ас тұзы 🇷🇺 Поваренная соль 🇬🇧 Table salt";

else if(text.includes("h2so4"))
answer="🇰🇿 Күкірт қышқылы 🇷🇺 Серная кислота 🇬🇧 Sulfuric acid";

else if(text.includes("hcl"))
answer="🇰🇿 Тұз қышқылы 🇷🇺 Соляная кислота 🇬🇧 Hydrochloric acid";

else if(text.includes("naoh"))
answer="🇰🇿 Натрий гидроксиді 🇷🇺 Гидроксид натрия 🇬🇧 Sodium hydroxide";

else if(text.includes("co2"))
answer="🇰🇿 Көмірқышқыл газы 🇷🇺 Углекислый газ 🇬🇧 Carbon dioxide";

else if(text.includes("o2"))
answer="🇰🇿 Оттек 🇷🇺 Кислород 🇬🇧 Oxygen";

else if(text.includes("h2o"))
answer="🇰🇿 Су 🇷🇺 Вода 🇬🇧 Water";

else if(text.includes("kmno4"))
answer="🇰🇿 Калий перманганаты 🇷🇺 Перманганат калия 🇬🇧 Potassium permanganate";

else if(text.includes("ph<7"))
answer="🇰🇿 Қышқыл орта 🇷🇺 Кислая среда 🇬🇧 Acidic medium";

else if(text.includes("моль"))
answer="🇰🇿 Формула: n=m/M 🇷🇺 Формула моля: n=m/M 🇬🇧 Mole formula: n=m/M";

document.getElementById("chatArea").innerHTML +=
"<div class='chat-user'>"+q+"</div>" +
"<div class='chat-ai'>"+answer+"</div>";

document.getElementById("question").value="";
}
</script>
