<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Химия көмекшісі VIP</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#000;color:#fff;}
header{text-align:center;padding:70px 20px;background:#111;}
header h1{font-size:45px;color:gold;margin-bottom:15px;}
.container{width:90%;max-width:1000px;margin:auto;padding:40px 0;}
.box{
background:#111;
padding:25px;
border-radius:18px;
border:1px solid gold;
margin-top:25px;
}
h2{color:gold;margin-bottom:12px;}
input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:12px;
}
button{
margin-top:15px;
padding:12px 24px;
border:none;
background:gold;
color:#000;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}
footer{
text-align:center;
padding:30px;
color:#888;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>📘 Химия көмекшісі VIP</h1>
<p>GitHub Ready Version</p>
</header>

<div class="container">

<div class="box">
<h2>📤 Материал жүктеу</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Файл жүктеу</button>

<p id="status" style="margin-top:15px;color:gold;"></p>
</div>

<div class="box">
<h2>📝 ҰБТ бөлімі</h2>

<button onclick="openTest()">Тестті ашу</button>

<div id="testArea" style="margin-top:15px;color:#fff;"></div>
</div>

</div>

<footer>
Author: Жулдыз | © 2026
</footer>

<script>
const supabaseUrl='https://sebjgfsivslubpfarwhu.supabase.co';
const supabaseKey='sb_publishable_wkjLAJsNYBe2RxLsuhQ1ug_62-h6Wq7';

const client=supabase.createClient(supabaseUrl,supabaseKey);

async function uploadFile(){

const file=document.getElementById("fileInput").files[0];

if(!file){
document.getElementById("status").innerHTML="Файл таңдаңыз";
return;
}

document.getElementById("status").innerHTML="Жүктелуде...";

const {data,error}=await client.storage
.from('materials')
.upload(Date.now()+"-"+file.name,file);

if(error){
document.getElementById("status").innerHTML="❌ "+error.message;
}else{
document.getElementById("status").innerHTML="✅ Файл сәтті жүктелді!";
}
}

function openTest(){

document.getElementById("testArea").innerHTML=
`
<h3>1-сұрақ: NaCl деген не?</h3>
<p>A) Газ</p>
<p>B) Тұз</p>
<p>C) Су</p>
<p>D) Металл</p>
`;
}
</script>

</body>
</html>
